name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================
  # PR Title Check (Conventional Commits)
  # ============================================
  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase letter.

  # ============================================
  # Size Check
  # ============================================
  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
            const changes = additions + deletions;
            const fileCount = files.length;

            let sizeLabel = 'size/S';
            let message = '';

            if (changes > 1000 || fileCount > 30) {
              sizeLabel = 'size/XL';
              message = '⚠️ This PR is very large. Consider breaking it into smaller PRs for easier review.';
            } else if (changes > 500 || fileCount > 20) {
              sizeLabel = 'size/L';
              message = '📦 This is a large PR. Consider if it can be split.';
            } else if (changes > 200 || fileCount > 10) {
              sizeLabel = 'size/M';
            } else if (changes > 50 || fileCount > 5) {
              sizeLabel = 'size/S';
            } else {
              sizeLabel = 'size/XS';
            }

            // Add size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel]
            });

            // Comment if PR is too large
            if (message) {
              const body = `## PR Size Analysis

            | Metric | Count |
            |--------|-------|
            | Files changed | ${fileCount} |
            | Additions | +${additions} |
            | Deletions | -${deletions} |
            | Total changes | ${changes} |

            ${message}`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # ============================================
  # Auto Label
  # ============================================
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label based on files changed
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labels = new Set();

            for (const file of files) {
              const path = file.filename;

              if (path.startsWith('app/') || path.startsWith('components/')) {
                labels.add('frontend');
              }
              if (path.startsWith('server/')) {
                labels.add('backend');
                labels.add('game-server');
              }
              if (path.startsWith('game/')) {
                labels.add('game-engine');
              }
              if (path.startsWith('supabase/migrations/')) {
                labels.add('database');
              }
              if (path.startsWith('.github/')) {
                labels.add('ci');
              }
              if (path.includes('test') || path.endsWith('.test.ts') || path.endsWith('.spec.ts')) {
                labels.add('testing');
              }
              if (path.endsWith('.md')) {
                labels.add('documentation');
              }
              if (path.startsWith('types/')) {
                labels.add('types');
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }

  # ============================================
  # First PR Welcome
  # ============================================
  welcome:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    steps:
      - name: Check if first PR
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const authorPRs = prs.filter(pr => pr.user.login === author);

            if (authorPRs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Welcome! 🎉

            Thanks for your first contribution to Bomberman Online, @${author}!

            A maintainer will review your PR soon. In the meantime:
            - Make sure all CI checks pass
            - Feel free to ask questions if you need help

            Happy coding! 🎮`
              });
            }
