name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Determine Version
  # ============================================
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      current_version: ${{ steps.version.outputs.current_version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          current=$(node -p "require('./package.json').version")
          echo "current_version=$current" >> $GITHUB_OUTPUT

          # Determine release type from commit messages or input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_type="${{ github.event.inputs.release_type }}"
          else
            # Analyze commits for conventional commit types
            commits=$(git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD)
            if echo "$commits" | grep -qE "^[a-f0-9]+ (feat!|BREAKING CHANGE)"; then
              release_type="major"
            elif echo "$commits" | grep -qE "^[a-f0-9]+ feat(\([^)]+\))?:"; then
              release_type="minor"
            else
              release_type="patch"
            fi
          fi

          # Calculate new version
          IFS='.' read -r major minor patch <<< "$current"
          case $release_type in
            major)
              new_version="$((major + 1)).0.0"
              ;;
            minor)
              new_version="${major}.$((minor + 1)).0"
              ;;
            patch)
              new_version="${major}.${minor}.$((patch + 1))"
              ;;
          esac

          # Add prerelease suffix if requested
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            new_version="${new_version}-beta.$(date +%Y%m%d%H%M%S)"
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "release_type=$release_type" >> $GITHUB_OUTPUT
          echo "New version: $new_version (from $current, type: $release_type)"

      - name: Check if release needed
        id: check
        run: |
          # Check if there are meaningful changes since last release
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$last_tag" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "No previous release found, will create first release"
          else
            changes=$(git log $last_tag..HEAD --oneline | wc -l)
            if [[ $changes -gt 0 ]]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Found $changes commits since last release"
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "No changes since last release"
            fi
          fi

  # ============================================
  # Build & Test
  # ============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          CI: true

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GAME_SERVER_URL: ${{ secrets.NEXT_PUBLIC_GAME_SERVER_URL }}

  # ============================================
  # Generate Changelog
  # ============================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [version, build]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$last_tag" ]]; then
            commits=$(git log --oneline HEAD~50..HEAD)
          else
            commits=$(git log --oneline $last_tag..HEAD)
          fi

          # Generate changelog sections
          changelog="## What's Changed in v${{ needs.version.outputs.new_version }}\n\n"

          # Features
          features=$(echo "$commits" | grep -E "^[a-f0-9]+ feat(\([^)]+\))?:" || true)
          if [[ -n "$features" ]]; then
            changelog+="### Features\n"
            while IFS= read -r line; do
              commit_hash=$(echo "$line" | cut -d' ' -f1)
              message=$(echo "$line" | sed 's/^[a-f0-9]* feat[^:]*: //')
              changelog+="- $message ([${commit_hash}](https://github.com/${{ github.repository }}/commit/${commit_hash}))\n"
            done <<< "$features"
            changelog+="\n"
          fi

          # Bug Fixes
          fixes=$(echo "$commits" | grep -E "^[a-f0-9]+ fix(\([^)]+\))?:" || true)
          if [[ -n "$fixes" ]]; then
            changelog+="### Bug Fixes\n"
            while IFS= read -r line; do
              commit_hash=$(echo "$line" | cut -d' ' -f1)
              message=$(echo "$line" | sed 's/^[a-f0-9]* fix[^:]*: //')
              changelog+="- $message ([${commit_hash}](https://github.com/${{ github.repository }}/commit/${commit_hash}))\n"
            done <<< "$fixes"
            changelog+="\n"
          fi

          # Performance
          perf=$(echo "$commits" | grep -E "^[a-f0-9]+ perf(\([^)]+\))?:" || true)
          if [[ -n "$perf" ]]; then
            changelog+="### Performance Improvements\n"
            while IFS= read -r line; do
              commit_hash=$(echo "$line" | cut -d' ' -f1)
              message=$(echo "$line" | sed 's/^[a-f0-9]* perf[^:]*: //')
              changelog+="- $message ([${commit_hash}](https://github.com/${{ github.repository }}/commit/${commit_hash}))\n"
            done <<< "$perf"
            changelog+="\n"
          fi

          # Other changes
          other=$(echo "$commits" | grep -vE "^[a-f0-9]+ (feat|fix|perf|docs|test|chore|ci)(\([^)]+\))?:" || true)
          if [[ -n "$other" ]]; then
            changelog+="### Other Changes\n"
            while IFS= read -r line; do
              if [[ -n "$line" ]]; then
                commit_hash=$(echo "$line" | cut -d' ' -f1)
                message=$(echo "$line" | cut -d' ' -f2-)
                changelog+="- $message ([${commit_hash}](https://github.com/${{ github.repository }}/commit/${commit_hash}))\n"
              fi
            done <<< "$other"
            changelog+="\n"
          fi

          # Contributors
          contributors=$(git log $last_tag..HEAD --format='%aN' 2>/dev/null | sort -u | head -10)
          if [[ -n "$contributors" ]]; then
            changelog+="### Contributors\n"
            while IFS= read -r name; do
              if [[ -n "$name" ]]; then
                changelog+="- @$name\n"
              fi
            done <<< "$contributors"
          fi

          # Save to file for multi-line output
          echo -e "$changelog" > changelog.md
          echo "changelog_file=changelog.md" >> $GITHUB_OUTPUT

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

  # ============================================
  # Create Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build, changelog]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Update package.json version
        run: |
          npm version ${{ needs.version.outputs.new_version }} --no-git-tag-version

      - name: Update CHANGELOG.md
        run: |
          if [[ -f CHANGELOG.md ]]; then
            # Prepend new changelog to existing file
            cat changelog.md CHANGELOG.md > temp_changelog.md
            mv temp_changelog.md CHANGELOG.md
          else
            # Create new CHANGELOG.md
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat changelog.md >> CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ needs.version.outputs.new_version }}"
          git push

      - name: Create tag
        run: |
          git tag -a "v${{ needs.version.outputs.new_version }}" -m "Release v${{ needs.version.outputs.new_version }}"
          git push origin "v${{ needs.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body_path: changelog.md
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.version.outputs.new_version }}';
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version}`;

            // Create commit status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Release',
              description: `Released v${version}`,
              target_url: releaseUrl
            });

  # ============================================
  # Deploy Release
  # ============================================
  deploy:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs: [version, release]
    environment:
      name: production
      url: https://bomberman.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Game Server to Railway
        run: railway up --service game-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Post-deployment health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30

          # Check frontend
          frontend_status=$(curl -s -o /dev/null -w "%{http_code}" https://bomberman.vercel.app)
          if [[ "$frontend_status" != "200" ]]; then
            echo "Frontend health check failed with status: $frontend_status"
            exit 1
          fi
          echo "Frontend is healthy"

          # Check game server (if URL is accessible)
          # game_server_status=$(curl -s -o /dev/null -w "%{http_code}" https://bomberman-server.railway.app/health)
          # if [[ "$game_server_status" != "200" ]]; then
          #   echo "Game server health check failed"
          #   exit 1
          # fi
          # echo "Game server is healthy"
