# =============================================================================
# Dependabot Configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# =============================================================================

version: 2

registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org

updates:
  # ---------------------------------------------------------------------------
  # NPM Dependencies
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    registries:
      - npm-registry
    versioning-strategy: increase
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    reviewers:
      - "jamesbrady"
    assignees:
      - "jamesbrady"
    groups:
      # Group React ecosystem updates
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"

      # Group Next.js ecosystem updates
      nextjs:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
        update-types:
          - "minor"
          - "patch"

      # Group TypeScript and related tooling
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-node"
          - "tsx"
        update-types:
          - "minor"
          - "patch"

      # Group testing libraries
      testing:
        patterns:
          - "jest"
          - "@jest/*"
          - "@testing-library/*"
          - "playwright"
          - "@playwright/*"
          - "vitest"
        update-types:
          - "minor"
          - "patch"

      # Group ESLint and Prettier
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
        update-types:
          - "minor"
          - "patch"

      # Group Tailwind CSS
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "autoprefixer"
        update-types:
          - "minor"
          - "patch"

      # Group Clerk authentication
      clerk:
        patterns:
          - "@clerk/*"
        update-types:
          - "minor"
          - "patch"

      # Group Supabase
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
        update-types:
          - "minor"
          - "patch"

      # Group PixiJS
      pixi:
        patterns:
          - "pixi.js"
          - "@pixi/*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # Ignore major versions (require manual review)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    reviewers:
      - "jamesbrady"
    groups:
      # Group all GitHub Actions updates
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Docker (if using Docker)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "jamesbrady"
